<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelStat Pro | India</title>
    <!-- SDK SETUP via CDN (Prevents NPM Build Errors) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #e0e0e0; margin: 0; overflow-x: hidden; }
        .obsidian-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .orange-glow { box-shadow: 0 0 50px -10px rgba(234, 88, 12, 0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased scrollbar-hide">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyALqSCGkQtKR0Q_ckyvAK1z0D_FxyEip5E",
            authDomain: "fuelstat-62b45.firebaseapp.com",
            projectId: "fuelstat-62b45",
            storageBucket: "fuelstat-62b45.firebasestorage.app",
            messagingSenderId: "921833323231",
            appId: "1:921833323231:web:0ea3574eee4367ef79076a"
        };

        const appId = 'fuel-stat-public-v16-agg';

        const App = () => {
            const [selectedState, setSelectedState] = useState('Maharashtra');
            const [fuelData, setFuelData] = useState({});
            const [loading, setLoading] = useState(true);
            const [status, setStatus] = useState({ node_status: 'OFFLINE', last_sync: null });
            const [error, setError] = useState(null);

            useEffect(() => {
                if (firebaseConfig.apiKey.includes("PASTE_YOUR")) {
                    setError("CONFIG_MISSING");
                    setLoading(false);
                    return;
                }

                try {
                    console.log("Initializing Firebase...");
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const db = firebase.firestore();
                    const auth = firebase.auth();

                    console.log("Attempting Anonymous Auth...");
                    auth.signInAnonymously().then(() => {
                        console.log("Auth successful.");
                        auth.onAuthStateChanged((user) => {
                            if (user) {
                                console.log("User UID:", user.uid);
                                // Path: artifacts/{appId}/public/data/fuel_rates
                                const dataRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('fuel_rates');
                                const statusRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('status').doc('latest');

                                console.log("Establishing Firestore listeners...");
                                const unsubscribeData = dataRef.onSnapshot((snapshot) => {
                                    const data = {};
                                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                                    if (Object.keys(data).length > 0) {
                                        setFuelData(data);
                                        setLoading(false);
                                        setError(null);
                                    } else {
                                        console.warn("Database is empty at path:", dataRef.path);
                                        setError("EMPTY_DATABASE");
                                        setLoading(false);
                                    }
                                }, (err) => {
                                    console.error("Firestore Permission Error:", err);
                                    if (err.code === 'permission-denied') {
                                        setError("PERMISSION_DENIED");
                                    } else {
                                        setError("CONNECTION_ERROR");
                                    }
                                    setLoading(false);
                                });

                                const unsubscribeStatus = statusRef.onSnapshot((doc) => {
                                    if (doc.exists) setStatus(doc.data());
                                }, (err) => console.error("Status error:", err));

                                return () => {
                                    unsubscribeData();
                                    unsubscribeStatus();
                                };
                            }
                        });
                    }).catch(err => {
                        console.error("Authentication Error:", err);
                        if (err.code === 'auth/configuration-not-found') setError("AUTH_DISABLED");
                        else setError("CONNECTION_ERROR");
                        setLoading(false);
                    });
                } catch (e) {
                    console.error("Critical Runtime Error:", e);
                    setError("CRITICAL_ERROR");
                    setLoading(false);
                }
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            if (error === "PERMISSION_DENIED") {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-black text-white p-6">
                        <div className="max-w-xl w-full obsidian-card p-10 rounded-[3rem] border-red-500/20 shadow-2xl text-center">
                            <i data-lucide="shield-off" className="w-16 h-16 text-red-500 mx-auto mb-8"></i>
                            <h2 className="text-2xl font-black uppercase tracking-tighter mb-4">Security Rules Block</h2>
                            <p className="text-zinc-400 text-sm leading-relaxed mb-8">
                                Firestore is rejecting the read request. This is because your <b>Security Rules</b> are too strict. <br/>
                                Please go to your <b>Firebase Console > Firestore Database > Rules</b> and replace everything with:
                            </p>
                            <div className="bg-zinc-900/50 p-6 rounded-2xl text-left font-mono text-[11px] text-zinc-300 border border-white/5 overflow-x-auto whitespace-pre leading-relaxed mb-8 select-all">
{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /artifacts/fuel-stat-public-v16-agg/{allPaths=**} {
      allow read: if true;
    }
  }
}`}
                            </div>
                            <button onClick={() => window.location.reload()} className="w-full bg-red-600/20 hover:bg-red-600/40 text-red-500 py-4 rounded-2xl font-black uppercase text-[10px] tracking-[0.2em] transition-all border border-red-500/20">
                                I Updated Rules, Refresh
                            </button>
                        </div>
                    </div>
                );
            }

            if (error === "CONFIG_MISSING") {
                return <div className="min-h-screen flex items-center justify-center bg-black text-white p-10 text-center">Paste your API keys in index.html</div>;
            }

            if (error === "AUTH_DISABLED") {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-black text-white p-6 text-center">
                        <div className="max-w-md obsidian-card p-10 rounded-3xl border-orange-500/20">
                            <i data-lucide="user-x" className="w-12 h-12 text-orange-500 mx-auto mb-6"></i>
                            <h2 className="text-xl font-black uppercase mb-4">Auth Disabled</h2>
                            <p className="text-zinc-500 text-xs mb-8">Enable <b>Anonymous</b> sign-in in Firebase Authentication > Sign-in Method.</p>
                            <button onClick={() => window.location.reload()} className="w-full bg-orange-600 py-3 rounded-xl font-bold uppercase text-[10px]">Refresh</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-44">
                    <header className="border-b border-white/5 bg-black/80 backdrop-blur-xl sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-6 py-6 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="w-11 h-11 bg-orange-600 rounded-2xl flex items-center justify-center orange-glow">
                                    <i data-lucide="droplets" className="text-white w-6 h-6"></i>
                                </div>
                                <h1 className="text-2xl font-black uppercase tracking-tighter text-white italic">FuelStat India</h1>
                            </div>
                            <div className="flex items-center gap-4 text-[10px] font-black uppercase tracking-widest text-zinc-500 bg-white/5 px-5 py-2.5 rounded-full border border-white/10">
                                <span className={`w-2 h-2 rounded-full ${status.node_status === 'ONLINE' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></span>
                                Node: {status.node_status}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 py-16">
                        {loading ? (
                            <div className="h-[50vh] flex flex-col items-center justify-center gap-6">
                                <div className="w-10 h-10 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-[10px] uppercase tracking-[0.4em] text-zinc-600 font-black italic">Synchronizing Satellite...</p>
                            </div>
                        ) : error === "EMPTY_DATABASE" ? (
                            <div className="p-20 border-2 border-dashed border-white/5 rounded-[4rem] text-center max-w-xl mx-auto">
                                <i data-lucide="database-zap" className="w-12 h-12 text-zinc-800 mx-auto mb-6 opacity-40"></i>
                                <h2 className="text-xs font-black uppercase tracking-[0.3em] text-zinc-500 mb-2">Sector Ledger Empty</h2>
                                <p className="text-[10px] text-zinc-700 italic">Database connection active. No sector data found. Run the GitHub Autopilot bot.</p>
                                <div className="mt-10 p-4 bg-white/5 rounded-2xl text-[9px] font-mono text-zinc-600 uppercase">
                                    Path: artifacts/{appId}/public/data/fuel_rates
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                <div className="lg:col-span-4 space-y-3">
                                    <h2 className="text-[11px] uppercase tracking-[0.4em] text-orange-500 font-black mb-8 flex items-center gap-2">
                                        <i data-lucide="map-pin" className="w-4 h-4"></i> Active Hubs
                                    </h2>
                                    {Object.keys(fuelData).map(state => (
                                        <button 
                                            key={state} 
                                            onClick={() => setSelectedState(state)} 
                                            className={`w-full text-left p-6 rounded-3xl transition-all font-black uppercase text-xs flex justify-between items-center group ${
                                                selectedState === state ? 'bg-orange-600 text-white shadow-2xl orange-glow translate-x-1' : 'bg-white/5 border border-white/5 hover:border-white/10'
                                            }`}
                                        >
                                            {state}
                                            <i data-lucide="chevron-right" className={`w-4 h-4 transition-transform ${selectedState === state ? 'translate-x-1' : 'opacity-10'}`}></i>
                                        </button>
                                    ))}
                                </div>
                                <div className="lg:col-span-8 space-y-10">
                                    <h2 className="text-7xl font-black italic uppercase text-white tracking-tighter leading-none">{selectedState} Ledger</h2>
                                    {Object.keys(fuelData[selectedState] || {}).map(city => (
                                        <div key={city} className="obsidian-card p-12 md:p-14 rounded-[3.5rem] group transition-all duration-700 hover:border-orange-500/20 relative overflow-hidden">
                                            <div className="flex justify-between items-center mb-10">
                                                <h3 className="text-4xl font-black uppercase text-white tracking-tighter italic">{city}</h3>
                                                <div className="flex items-center gap-2">
                                                    <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                                    <span className="text-[9px] font-black uppercase tracking-widest text-zinc-500">Live Feed</span>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                                <div className="bg-white/5 p-10 rounded-[2.5rem] border border-white/5 hover:bg-white/10 transition-colors">
                                                    <p className="text-[11px] text-zinc-600 font-black mb-2 uppercase tracking-widest">Petrol</p>
                                                    <div className="flex items-baseline gap-2">
                                                        <span className="text-sm font-bold italic text-zinc-700">₹</span>
                                                        <span className="text-5xl font-black italic text-white tracking-tighter">{fuelData[selectedState][city].petrol?.normal}</span>
                                                    </div>
                                                </div>
                                                <div className="bg-white/5 p-10 rounded-[2.5rem] border border-white/5 hover:bg-white/10 transition-colors">
                                                    <p className="text-[11px] text-zinc-600 font-black mb-2 uppercase tracking-widest">Diesel</p>
                                                    <div className="flex items-baseline gap-2">
                                                        <span className="text-sm font-bold italic text-zinc-700">₹</span>
                                                        <span className="text-5xl font-black italic text-white tracking-tighter">{fuelData[selectedState][city].diesel?.normal}</span>
                                                    </div>
                                                </div>
                                                <div className="bg-orange-600/10 p-10 rounded-[2.5rem] border border-orange-500/20 group-hover:bg-orange-600/20 transition-colors">
                                                    <p className="text-[11px] text-orange-500 font-black mb-2 uppercase tracking-widest">LPG Gas</p>
                                                    <div className="flex items-baseline gap-2 text-orange-500">
                                                        <span className="text-sm font-bold italic">₹</span>
                                                        <span className="text-5xl font-black italic tracking-tighter">{fuelData[selectedState][city].lpg?.domestic}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="mt-40 text-center opacity-20 hover:opacity-100 transition-opacity pb-20">
                        <p className="text-[10px] font-black uppercase tracking-[1em] text-white">FuelStat India Public Surveillance Utility</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
