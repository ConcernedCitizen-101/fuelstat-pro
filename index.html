<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelStat Pro | India</title>
    <!-- Tailwind CSS with custom config for responsiveness -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (Stable UMD versions) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase Compat (Stable Global Scripts) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; color: #e0e0e0; margin: 0; overflow-x: hidden; width: 100vw; }
        .obsidian-card { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .orange-glow { box-shadow: 0 0 50px -10px rgba(234, 88, 12, 0.3); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes shimmer { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        .animate-shimmer { animation: shimmer 2s infinite; }
    </style>
</head>
<body class="antialiased scrollbar-hide">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION: ENSURE YOUR KEYS ARE HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyALqSCGkQtKR0Q_ckyvAK1z0D_FxyEip5E",
            authDomain: "fuelstat-62b45.firebaseapp.com",
            projectId: "fuelstat-62b45",
            storageBucket: "fuelstat-62b45.firebasestorage.app",
            messagingSenderId: "921833323231",
            appId: "1:921833323231:web:0ea3574eee4367ef79076a"
        };

        const appId = 'fuel-stat-public-v16-agg';

        const App = () => {
            const [selectedState, setSelectedState] = useState('Maharashtra');
            const [fuelData, setFuelData] = useState({});
            const [loading, setLoading] = useState(true);
            const [status, setStatus] = useState({ node_status: 'OFFLINE', last_sync: null });
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("PASTE_YOUR")) {
                    setError("CONFIG_MISSING");
                    setLoading(false);
                    return;
                }

                try {
                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const db = firebase.firestore();
                    const auth = firebase.auth();

                    auth.signInAnonymously().then(() => {
                        auth.onAuthStateChanged((user) => {
                            if (user) {
                                const dataRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('fuel_rates');
                                const statusRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('status').doc('latest');

                                dataRef.onSnapshot((snapshot) => {
                                    const data = {};
                                    snapshot.forEach(doc => { data[doc.id] = doc.data(); });
                                    if (Object.keys(data).length > 0) {
                                        setFuelData(data);
                                        setLoading(false);
                                        setError(null);
                                    } else {
                                        setError("EMPTY_DATABASE");
                                        setLoading(false);
                                    }
                                }, (err) => {
                                    if (err.code === 'permission-denied') setError("PERMISSION_DENIED");
                                    setLoading(false);
                                });

                                statusRef.onSnapshot((doc) => {
                                    if (doc.exists) setStatus(doc.data());
                                });
                            }
                        });
                    }).catch(err => {
                        if (err.code === 'auth/configuration-not-found') setError("AUTH_DISABLED");
                        setLoading(false);
                    });
                } catch (e) {
                    setError("CRITICAL_ERROR");
                    setLoading(false);
                }
            }, []);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="border-b border-white/5 bg-black/60 backdrop-blur-xl sticky top-0 z-50 w-full">
                        <div className="max-w-6xl mx-auto px-4 md:px-6 py-4 md:py-6 flex items-center justify-between">
                            <div className="flex items-center gap-3 md:gap-4">
                                <div className="w-9 h-9 md:w-11 md:h-11 bg-orange-600 rounded-xl flex items-center justify-center orange-glow shrink-0">
                                    <i data-lucide="droplets" className="text-white w-5 h-5 md:w-6 md:h-6"></i>
                                </div>
                                <div className="overflow-hidden">
                                    <h1 className="text-lg md:text-2xl font-black uppercase tracking-tighter text-white italic truncate">FuelStat India</h1>
                                    <div className="flex items-center gap-2">
                                        <span className={`w-1.5 h-1.5 md:w-2 md:h-2 rounded-full ${status.node_status === 'ONLINE' ? 'bg-green-500 animate-pulse' : 'bg-red-500'}`}></span>
                                        <p className="text-[8px] md:text-[10px] uppercase tracking-widest text-zinc-600 font-black">Node: {status.node_status}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 text-[8px] md:text-[10px] font-black uppercase tracking-widest text-zinc-500 bg-white/5 px-3 md:px-5 py-2 md:py-2.5 rounded-full border border-white/10 shrink-0">
                                <i data-lucide="clock" className="w-3 h-3 md:w-3.5 md:h-3.5 text-orange-500" />
                                <span>{status.last_sync ? new Date(status.last_sync.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...'}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-4 md:px-6 py-8 md:py-16 w-full flex-grow">
                        {loading ? (
                            <div className="h-[50vh] flex flex-col items-center justify-center gap-6">
                                <div className="w-10 h-10 border-2 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
                                <p className="text-[10px] uppercase tracking-[0.4em] text-zinc-600 font-black italic">Connecting...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-16">
                                {/* Navigation */}
                                <div className="lg:col-span-4 lg:sticky lg:top-32 h-fit">
                                    <h2 className="text-[10px] uppercase tracking-[0.4em] text-orange-500 font-black mb-6 md:mb-10 flex items-center gap-2">
                                        <i data-lucide="map-pin" className="w-4 h-4"></i> Active Hubs
                                    </h2>
                                    <div className="flex lg:flex-col overflow-x-auto lg:overflow-x-visible pb-4 lg:pb-0 gap-3 scrollbar-hide">
                                        {Object.keys(fuelData).map(state => (
                                            <button 
                                                key={state} 
                                                onClick={() => setSelectedState(state)} 
                                                className={`whitespace-nowrap lg:whitespace-normal text-left px-6 md:px-8 py-4 md:py-6 rounded-2xl md:rounded-3xl transition-all duration-500 flex items-center justify-between group shrink-0 lg:shrink ${
                                                    selectedState === state ? 'bg-orange-600 text-white shadow-2xl orange-glow lg:translate-x-2' : 'bg-white/5 border border-white/5 hover:border-white/20'
                                                }`}
                                            >
                                                <span className="font-black uppercase tracking-widest text-[10px] md:text-xs">{state}</span>
                                                <i data-lucide="chevron-right" className={`hidden lg:block w-4 h-4 transition-transform ${selectedState === state ? 'translate-x-1' : 'opacity-10'}`}></i>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* Data Feed */}
                                <div className="lg:col-span-8 space-y-8 md:space-y-12">
                                    <div className="flex items-baseline gap-4 mb-4 md:mb-6">
                                        <h2 className="text-4xl md:text-7xl font-black italic uppercase tracking-tighter text-white leading-none">{selectedState}</h2>
                                        <span className="text-orange-500 text-[8px] md:text-[10px] font-black uppercase tracking-[0.4em] bg-orange-600/10 px-3 md:px-4 py-1 md:py-1.5 rounded-full border border-orange-500/20 shrink-0">Live</span>
                                    </div>

                                    {Object.keys(fuelData[selectedState] || {}).map(city => (
                                        <div key={city} className="obsidian-card p-6 md:p-14 rounded-[2rem] md:rounded-[4rem] group transition-all duration-700 hover:border-orange-500/20 shadow-4xl relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1.5 h-full bg-orange-600 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                            <div className="flex justify-between items-center mb-8 md:mb-12">
                                                <h3 className="text-2xl md:text-5xl font-black uppercase tracking-tighter text-white italic truncate pr-4">{city}</h3>
                                                <div className="flex items-center gap-2 shrink-0">
                                                    <div className="w-1.5 h-1.5 md:w-2 md:h-2 rounded-full bg-green-500"></div>
                                                    <span className="text-[7px] md:text-[9px] font-black uppercase tracking-widest text-zinc-500">Verified</span>
                                                </div>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">
                                                <div className="p-6 md:p-10 bg-white/5 rounded-[1.5rem] md:rounded-[2.5rem] border border-white/5 group-hover:bg-white/10 transition-colors">
                                                    <p className="text-[8px] md:text-[11px] text-zinc-600 font-black uppercase tracking-widest mb-2 md:mb-3">Petrol</p>
                                                    <div className="flex items-baseline gap-1 md:gap-2">
                                                        <span className="text-[10px] md:text-sm text-zinc-700 italic font-bold">₹</span>
                                                        <span className="text-3xl md:text-5xl lg:text-6xl font-black italic tracking-tighter text-white">
                                                            {fuelData[selectedState][city].petrol?.normal}
                                                        </span>
                                                    </div>
                                                </div>
                                                
                                                <div className="p-6 md:p-10 bg-white/5 rounded-[1.5rem] md:rounded-[2.5rem] border border-white/5 group-hover:bg-white/10 transition-colors">
                                                    <p className="text-[8px] md:text-[11px] text-zinc-600 font-black uppercase tracking-widest mb-2 md:mb-3">Diesel</p>
                                                    <div className="flex items-baseline gap-1 md:gap-2">
                                                        <span className="text-[10px] md:text-sm text-zinc-700 italic font-bold">₹</span>
                                                        <span className="text-3xl md:text-5xl lg:text-6xl font-black italic tracking-tighter text-white">
                                                            {fuelData[selectedState][city].diesel?.normal}
                                                        </span>
                                                    </div>
                                                </div>

                                                <div className="p-6 md:p-10 bg-orange-600/10 rounded-[1.5rem] md:rounded-[2.5rem] border border-orange-500/20 col-span-1 sm:col-span-2 md:col-span-1">
                                                    <p className="text-[8px] md:text-[11px] text-orange-500 font-black uppercase tracking-widest mb-2 md:mb-3">LPG Gas</p>
                                                    <div className="flex items-baseline gap-1 md:gap-2 text-orange-500">
                                                        <span className="text-[10px] md:text-sm font-bold italic">₹</span>
                                                        <span className="text-3xl md:text-5xl lg:text-6xl font-black italic tracking-tighter">
                                                            {fuelData[selectedState][city].lpg?.domestic}
                                                        </span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="mt-auto py-12 text-center opacity-30 px-6">
                        <p className="text-[8px] md:text-[10px] font-black uppercase tracking-[0.5em] md:tracking-[1.2em] text-white italic">FuelStat India Public Surveillance Utility</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
